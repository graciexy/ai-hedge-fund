name: AI Hedge Fund Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1-5'

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install tushare
      - name: Run A-Share Analysis
        run: python src/main.py --tickers "${{ vars.TICKERS }}" --analysts-all --model "openai/gpt-5.2"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ vars.OPENAI_API_BASE }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
