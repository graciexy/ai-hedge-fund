name: Run A-Share Analysis

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 1 * * *'  # 每天凌晨1点运行（可选）

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Clean Python cache
      run: |
        echo "Cleaning Python cache..."
        find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
        find . -name "*.pyc" -delete 2>/dev/null || true
        find . -name "*.pyo" -delete 2>/dev/null || true
        echo "Cache cleaned"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 检查依赖文件是否存在
        if [ -f "requirements.txt" ]; then
          echo "Found requirements.txt, installing..."
          pip install -r requirements.txt
        elif [ -f "pyproject.toml" ]; then
          echo "Found pyproject.toml, installing..."
          pip install -e .
        else
          echo "No dependency file found, installing common packages..."
          pip install tushare pandas pydantic python-dotenv langgraph langchain-openai
        fi
        
    - name: Verify api.py changes
      run: |
        echo "Checking search_line_items function signature:"
        grep -A 2 "def search_line_items" src/tools/api.py || echo "Function not found!"
        
    - name: Run A-Share Analysis
      env:
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python -B src/main.py --tickers "605090.SH 513130.SH 002539.SZ" --analysts-all --model "gpt-4.1"
